var POOL_RISK_RATIONALES = {

  "Fluid USDC": "Established since May 2024. $177M TVL. Audited. Standard lending yield, no exotic mechanics.",

  "feUSD BTC (Felix)": "BTC-collateralized = low directional risk. Only 18 days old. $2.2M TVL. Unaudited new code.",
  "limUSD (Liminal)": "11 days old. Pendle-based adds PT/YT complexity. Liminal has no audit track record. APY may be token-incentive inflated.",
  "Fluid USD Lite": "24 days old. New product variant, different from Fluid's standard lending. $38M launch TVL promising but mechanism unproven.",
  "feUSD HYPE (Felix)": "18 days old. HYPE-collateralized = exposed to HYPE volatility. CDP liquidation risk in sharp downturns. $8.1M TVL.",
  "feUSD kHYPE (Felix)": "kHYPE-collateralized = exposed to HYPE ecosystem risk via staking derivative. CDP liquidation risk in sharp downturns. ~$1.1M TVL."
};
function riskColor(score) { return ['#3fb950','#3fb950','#d29922','#f0883e','#f85149','#f85149'][score]; }
function riskLabel(score) { return ['Very Safe','Safe','Moderate','Risky','High Risk','Very High'][score]; }

var apyChart = null, tvlChart = null, currentWindow = '30';
var visibility = {};
POOLS.forEach(function(p) { visibility[p] = true; });

function fmtTvl(v) {
  if (v >= 1e9) return '$' + (v / 1e9).toFixed(2) + 'B';
  if (v >= 1e6) return '$' + (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'K';
  return '$' + v.toFixed(0);
}

function daysAgo(n) { var d = new Date(); d.setDate(d.getDate() - n); return d.toISOString().slice(0, 10); }
function filterByWindow(data, d) { if (d === 'all') return data; var c = daysAgo(d); var o = {}; for (var k in data) { if (!data[k]) continue; o[k] = data[k].filter(function(p) { return p[0] >= c; }); } return o; }

function buildCards(allData, windowData) {
  var a = allData, w = windowData, h = '';
  for (var i = 0; i < POOLS.length; i++) {
    var s = POOLS[i], points = a[s] || [];
    if (!points.length) continue;
    var l = points[points.length - 1], wp = w[s] || [];
    var fpApy = wp.length ? wp[0][1] : l[1];
    var ch = l[1] - fpApy, chP = fpApy ? (ch / fpApy) * 100 : 0, up = ch >= 0;
    var apys = points.map(function(p) { return p[1]; });
    var maxApy = Math.max.apply(null, apys), minApy = Math.min.apply(null, apys);
    var tvls = points.map(function(p) { return p[2]; });
    var maxTvl = Math.max.apply(null, tvls);
    var color = POOL_COLORS[i], riskScore = POOL_RISKS[s] || 0;
    h += '<div class="card">'
      + '<div class="card-symbol">' + s + '</div>'
      + '<div class="card-apy" style="color:' + color + '">' + l[1].toFixed(2) + '%</div>'
      + '<div class="card-tvl">' + fmtTvl(l[2]) + ' TVL</div>'
      + '<div class="card-change ' + (up ? 'up' : 'down') + '">'
      + (up ? '&#9650;' : '&#9660;') + ' ' + chP.toFixed(2) + '% (' + (up ? '+' : '') + ch.toFixed(2) + ' pp)</div>'
      + '<div class="card-risk" style="margin-top:8px;font-size:0.8rem;display:flex;align-items:center;gap:6px;">'
      + '<span style="color:' + riskColor(riskScore) + '">' + '★'.repeat(riskScore) + '<span style="color:#484f58">' + '☆'.repeat(5-riskScore) + '</span></span>'
      + '<span style="color:' + riskColor(riskScore) + ';font-weight:600">' + riskLabel(riskScore) + '</span></div>'
      + '<div class="card-risk-detail" style="font-size:0.72rem;color:#8b949e;margin-top:4px;line-height:1.4;">' + (POOL_RISK_RATIONALES[s] || '') + '</div>'
      + '<dl class="card-detail">'
      + '<div><dt>Min APY</dt><dd>' + minApy.toFixed(2) + '%</dd></div>'
      + '<div><dt>Max APY</dt><dd>' + maxApy.toFixed(2) + '%</dd></div>'
      + '<div><dt>Peak TVL</dt><dd>' + fmtTvl(maxTvl) + '</dd></div>'
      + '<div><dt>Date</dt><dd>' + l[0] + '</dd></div></dl></div>';
  }
  document.getElementById('cards').innerHTML = h;
}

function buildApyChart(windowData) {
  var ds = [];
  for (var i = 0; i < POOLS.length; i++) {
    var s = POOLS[i]; if (!visibility[s]) continue;
    var p = windowData[s]; if (!p || !p.length) continue;
    var isBaseline = s === 'AAVE USDC' || s === 'Fluid USDC';
    ds.push({
      key: s, label: s, data: p.map(function(x) { return { x: x[0], y: x[1] }; }),
      borderColor: POOL_COLORS[i], borderWidth: isBaseline ? 1.5 : 2.5,
      borderDash: isBaseline ? [6, 4] : [],
      pointRadius: 0, tension: 0.2, fill: false
    });
  }
  var ctx = document.getElementById('apyChart').getContext('2d');
  if (apyChart) { apyChart.destroy(); apyChart = null; }
  apyChart = new Chart(ctx, {
    type: 'line', data: { datasets: ds },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: { mode: 'index', backgroundColor: '#161b22', borderColor: '#30363d', borderWidth: 1, titleColor: '#f0f6fc', bodyColor: '#c9d1d9', callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2) + '%'; } } }
      },
      scales: {
        x: { type: 'category', grid: { color: '#21262d' }, ticks: { color: '#8b949e', maxTicksLimit: 12, maxRotation: 0 } },
        y: { title: { display: true, text: 'APY %', color: '#8b949e' }, grid: { color: '#21262d' }, ticks: { color: '#8b949e', callback: function(v) { return v.toFixed(1) + '%'; } } }
      }
    }
  });
}

function buildTvlChart(windowData) {
  var ds = [];
  for (var i = 0; i < POOLS.length; i++) {
    var s = POOLS[i]; if (!visibility[s]) continue;
    var p = windowData[s]; if (!p || !p.length) continue;
    ds.push({
      key: s, label: s, data: p.map(function(x) { return { x: x[0], y: x[2] }; }),

function buildToggles(containerId) {
  var h = '';
  for (var i = 0; i < POOLS.length; i++) {
    var s = POOLS[i], on = visibility[s];
    h += '<label class="toggle ' + (on ? 'on' : 'off') + '" data-key="' + s + '"><input type="checkbox" ' + (on ? 'checked' : '') + '><span class="dot" style="background:' + POOL_COLORS[i] + '"></span>' + s + '</label>';
  }
  document.getElementById(containerId).innerHTML = h;
}

function refresh(wd) {
  currentWindow = wd;
  var w = filterByWindow(ALL_DATA, wd);
  buildCards(ALL_DATA, w);
  buildApyChart(w);
  buildTvlChart(w);
  buildToggles('apy-toggles');
  buildToggles('tvl-toggles');
  updateToggleAllButtons();
}

document.getElementById('time-buttons').addEventListener('click', function(e) {
  if (!e.target.classList.contains('time-btn')) return;
  var b = document.querySelectorAll('#time-buttons .time-btn');
  for (var i = 0; i < b.length; i++) b[i].classList.remove('active');
  e.target.classList.add('active');
  refresh(e.target.dataset.window);
});

document.querySelector('main').addEventListener('click', function(e) {
  var l = e.target.closest('.toggle');
  if (l) {
    e.preventDefault();
    var k = l.getAttribute('data-key');
    visibility[k] = !visibility[k];
    if (visibility[k]) { l.classList.remove('off'); l.classList.add('on'); l.querySelector('input').checked = true; }
    else { l.classList.remove('on'); l.classList.add('off'); l.querySelector('input').checked = false; }
    syncToggles(k);
    refresh(currentWindow);
    return;
  }
  if (e.target.classList.contains('toggle-all')) {
    var anyOn = POOLS.some(function(p) { return visibility[p]; });
    for (var p = 0; p < POOLS.length; p++) { visibility[POOLS[p]] = !anyOn; }
    syncAllToggles();
    refresh(currentWindow);
    return;
  }
});

function syncToggles(k) {
  var all = document.querySelectorAll('.toggle[data-key="' + k + '"]');
  for (var m = 0; m < all.length; m++) {
    all[m].classList.remove('off','on'); all[m].classList.add(visibility[k] ? 'on' : 'off');
    var cb = all[m].querySelector('input'); if (cb) cb.checked = visibility[k];
  }
}

function syncAllToggles() {
  for (var p = 0; p < POOLS.length; p++) syncToggles(POOLS[p]);
}

function updateToggleAllButtons() {
  var anyOn = POOLS.some(function(p) { return visibility[p]; });
  var btns = document.querySelectorAll('.toggle-all');
  for (var b = 0; b < btns.length; b++) {
    btns[b].textContent = anyOn ? 'None' : 'All';
  }
}

window.addEventListener('load', function() {
  setTimeout(function() { refresh('30'); }, 100);
});
</script>
</body>
</html>
